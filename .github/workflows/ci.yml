name: CI - F1 Predict

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ─── Tests API ────────────────────────────────────────────────
  test-api:
    name: Tests API (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          cd api
          pytest tests/ -v --tb=short

  # ─── Lint Python ──────────────────────────────────────────────
  lint-python:
    name: Lint Python (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 api/app ml --max-line-length=120 --exclude=__pycache__

  # ─── Build Docker API ─────────────────────────────────────────
  build-docker-api:
    name: Build Docker API
    runs-on: ubuntu-latest
    needs: test-api

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image API
        run: docker build -t f1predict-api ./api

  # ─── Build Docker ML ──────────────────────────────────────────
  build-docker-ml:
    name: Build Docker ML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image ML
        run: docker build -t f1predict-ml ./ml
